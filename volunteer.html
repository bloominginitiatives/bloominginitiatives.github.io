<section class="content fade-in">
    <h2>Volunteer With Us</h2>
    <p>Your time and compassion can change lives. Join our community of volunteers and help us make a lasting impact.</p>

    <h3>Volunteer Interest Form</h3>

    <form action="#" method="POST" class="card">
        <label>Full Name</label><br>
        <input type="text" name="name" required><br><br>

        <label>Email</label><br>
        <input type="email" name="email" required><br><br>

        <label>Why do you want to volunteer?</label><br>
        <textarea name="message" rows="5" required></textarea><br><br>

        <button class="cta" type="submit">Submit</button>
    </form>
</section>
